<nav class="nav-menu">
  <!-- Root -->
  <button class="nav-item" [class.active]="isActive('')" (click)="navigate('')">
    <span class="nav-icon"><icon-home [size]="15" /></span>
    <span class="nav-label">Mina filer</span>
  </button>

  <!-- Rekursivt mappträd -->
  <ng-container *ngTemplateOutlet="folderTree; context: { path: '', depth: 0 }" />

  <ng-template #folderTree let-path="path" let-depth="depth">
    @for (entry of childEntries(path); track entry.name) {
      <div class="nav-item-container" [style.padding-left.px]="depth * 16">
        @if (!entry.file) {
          <button class="nav-expand-btn" (click)="toggleExpand(entry.name, $event)">
            @if (isExpanded(entry.name)) {
              <icon-chevron-down [size]="12" />
            } @else {
              <icon-chevron-right [size]="12" />
            }
          </button>
        } @else {
          <span class="nav-expand-spacer"></span>
        }

        <button class="nav-item"
                [class.active]="!entry.file && isActive(entry.name)"
                [class.nav-item-file]="entry.file"
                (click)="navigate(entry)">
          <span class="nav-icon">
            @switch (iconType(entry)) {
              @case ('folder') {
                @if (isExpanded(entry.name)) {
                  <icon-folder-open [size]="15" />
                } @else {
                  <icon-folder [size]="15" />
                }
              }
              @case ('image') { <icon-image [size]="15" /> }
              @default { <icon-file [size]="15" /> }
            }
          </span>
          <span class="nav-label">{{ nav.shortName(entry.name) }}</span>
        </button>
      </div>

      @if (!entry.file && isExpanded(entry.name)) {
        <ng-container *ngTemplateOutlet="folderTree; context: { path: entry.name, depth: depth + 1 }" />
      }
    }
  </ng-template>
</nav>
