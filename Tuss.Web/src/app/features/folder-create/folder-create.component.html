<div class="card panel">
  <h2 class="panel-title">Ny mapp</h2>
  <div class="input-row">
    @if (pathPrefix) {
      <span class="mono file-meta">{{ pathPrefix }}</span>
    }
    <input class="input-field" style="flex:1"
           [(ngModel)]="folderName"
           placeholder="mappnamn"
           (keyup.enter)="create()" />
    <button class="btn btn-secondary"
            (click)="create()"
            [disabled]="!folderName.trim() || loading()">
      Skapa
    </button>
  </div>
  @if (message()) {
    <p class="status-message"
       [class.status-success]="success()"
       [class.status-error]="!success()">
      {{ message() }}
    </p>
  }
</div>
