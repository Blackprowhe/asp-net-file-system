<div class="card panel">
  <h2 class="panel-title">Ny mapp</h2>
  <div class="input-row">
    <input class="input-field"
           [(ngModel)]="folderPath"
           placeholder="t.ex. projekt/bilder"
           (keyup.enter)="create()" />
    <button class="btn btn-secondary"
            (click)="create()"
            [disabled]="!folderPath.trim() || loading()">
      Skapa mapp
    </button>
  </div>
  @if (message()) {
    <p class="status-message"
       [class.status-success]="success()"
       [class.status-error]="!success()">
      {{ message() }}
    </p>
  }
</div>
