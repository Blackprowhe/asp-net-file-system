<div class="card panel">
  <h2 class="panel-title">Ladda upp fil</h2>

  <div class="input-row">
    <input type="file" #fileInput (change)="onFileChange(fileInput.files)" />
  </div>

  @if (selectedFile()) {
    <div class="input-group">
      <label class="input-label">Sökväg på servern</label>
      <input class="input-field"
             [(ngModel)]="targetName"
             placeholder="t.ex. projekt/README.md" />
    </div>

    <div class="input-row">
      <button class="btn btn-primary"
              (click)="upload('post')"
              [disabled]="!targetName.trim() || loading()"
              title="Skapar ny fil, 409 om den redan finns">
        POST — ny fil
      </button>
      <button class="btn btn-secondary"
              (click)="upload('put')"
              [disabled]="!targetName.trim() || loading()"
              title="Skapar ny version, skapar filen om den inte finns">
        PUT — ny version
      </button>
      <button class="btn btn-ghost" (click)="clear()">Avbryt</button>
    </div>
  }

  @if (message()) {
    <p class="status-message"
       [class.status-success]="success()"
       [class.status-error]="!success()">
      {{ message() }}
    </p>
  }
</div>
