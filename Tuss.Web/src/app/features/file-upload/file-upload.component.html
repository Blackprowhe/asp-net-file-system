<div class="card panel">
  <h2 class="panel-title"><icon-upload [size]="15" /> Ladda upp fil</h2>

  <div class="input-row">
    <input type="file" #fileInput (change)="onFileChange(fileInput.files)" />
  </div>

  @if (selectedFile()) {
    <div class="input-group">
      <label class="input-label">Filnamn</label>
      <div class="input-row">
        @if (pathPrefix) {
          <span class="mono file-meta">{{ pathPrefix }}</span>
        }
        <input class="input-field" style="flex:1"
               [(ngModel)]="targetName"
               placeholder="filnamn.txt" />
      </div>
    </div>

    <div class="input-row">
      <button class="btn btn-primary"
              (click)="upload('post')"
              [disabled]="!targetName.trim() || loading()">
        Skapa ny fil
      </button>
      <button class="btn btn-secondary"
              (click)="upload('put')"
              [disabled]="!targetName.trim() || loading()">
        Ny version
      </button>
      <button class="btn btn-ghost" (click)="clear()">Avbryt</button>
    </div>
  }

  @if (message()) {
    <p class="status-message"
       [class.status-success]="success()"
       [class.status-error]="!success()">
      {{ message() }}
    </p>
  }
</div>
