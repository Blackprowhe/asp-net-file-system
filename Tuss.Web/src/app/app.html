<div class="shell">

  <header class="topbar">
    <span class="topbar-brand font-serif">Tuss</span>
  </header>

  <div class="shell-body">

    <aside class="sidebar">
      <app-sidebar />
    </aside>

    <main class="main-content">

      <!-- Åtgärdspaneler -->
      <div class="action-panels">
        <app-file-upload (uploadDone)="browser.load()" />
        <app-folder-create (folderCreated)="browser.load()" />
      </div>

      <!-- Fillistan -->
      <app-file-browser #browser />

    </main>

  </div>

</div>
