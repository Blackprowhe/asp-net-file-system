<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pro Max</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <h2> Filer</h2>
        <input id="newFileName" placeholder="nyfil.txt"/>
        <button onclick="createFile()">Skapa Fil</button>
       <button onclick="createFolder()">Skapa Mapp</button>

         <input type="file" id="uploadFileInput" />
    <button id="uploadButton">Ladda upp fil</button>
    

        <div id="fileList" class="file-list"></div>
    </aside>

    <main class="main">
       <div class="topbar">
       <h2 id="currentPathDisplay">/</h2> 
    <h2 id="fileName">Ingen fil vald</h2>

    <div class="actions">
        <button onclick="goBack()">⬅️ Tillbaka</button>
        <button id="saveButton">Spara</button>
        <button id="deleteButton">Radera</button>
    </div>
</div>

        <textarea id="editor" placeholder="Välj en fil för att visa innehåll..."></textarea>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <script src="script.js"></script>
    
</body>
</html>
